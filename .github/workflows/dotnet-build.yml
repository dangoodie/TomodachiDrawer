name: .NET Build Test and Publish artifacts

on:
  push:
    branches:
      - master
    tags:
      - '*.*.*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        configuration: [Debug, Release]

    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'
        cache: true
        cache-dependency-path: '**/*.csproj'
    - name: Restore dependencies
      run: dotnet restore -v n /p:EnableWindowsTargeting=true
    - name: Build
      run: dotnet build --configuration ${{ matrix.configuration }} --no-restore
    - name: Test
      run: dotnet test --configuration ${{ matrix.configuration }} --no-build --verbosity normal /p:EnableWindowsTargeting=true
  build-firmware:
    name: Build ESP32-S3 firmware
    runs-on: ubuntu-latest
    env:
      IDF_VERSION: v6.0
    steps:
    - uses: actions/checkout@v6
    - name: Restore cached ESP-IDF docker image
      id: idf-docker-cache
      uses: actions/cache@v4
      with:
        path: /tmp/idf-docker-image.tar
        key: idf-docker-${{ env.IDF_VERSION }}
    - name: Load ESP-IDF docker image from cache
      if: steps.idf-docker-cache.outputs.cache-hit == 'true'
      run: docker load -i /tmp/idf-docker-image.tar
    - name: Build firmware
      uses: espressif/esp-idf-ci-action@v1
      with:
        esp_idf_version: ${{ env.IDF_VERSION }}
        target: esp32s3
        path: 'TomodachiDrawer.Firmware.ESP32S3'
    - name: Save ESP-IDF docker image for next run
      if: steps.idf-docker-cache.outputs.cache-hit != 'true'
      run: docker save espressif/idf:${{ env.IDF_VERSION }} -o /tmp/idf-docker-image.tar
    - name: Stage firmware artifacts
      run: |
        mkdir firmware_artifacts
        cp TomodachiDrawer.Firmware.ESP32S3/build/bootloader/bootloader.bin firmware_artifacts/
        cp TomodachiDrawer.Firmware.ESP32S3/build/partition_table/partition-table.bin firmware_artifacts/
        cp TomodachiDrawer.Firmware.ESP32S3/build/TomodachiDrawer_FW_ESP32S3.bin firmware_artifacts/
        ls -la firmware_artifacts/
    - name: Upload firmware
      uses: actions/upload-artifact@v7
      with:
        name: esp32s3-firmware
        path: firmware_artifacts/

  publish-avalonia:
    runs-on: ubuntu-latest
    needs: [build, build-firmware]
    strategy:
      fail-fast: false
      matrix:
        configuration: [Release]
        runtime: [win-x64, linux-x64, linux-arm64, osx-x64, osx-arm64] # win-arm64 removed since Google.OrTools dont even ship it. How does that not give a build warning??

    env:
      ESPTOOL_VERSION: 5.2.0
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'
        cache: true
        cache-dependency-path: '**/*.csproj'
    - name: Download ESP32-S3 firmware
      uses: actions/download-artifact@v8
      with:
        name: esp32s3-firmware
        path: TomodachiDrawer.UI.Avalonia/EspFirmware
    - name: Download esptool for ${{ matrix.runtime }}
      shell: bash
      run: |
        set -euo pipefail
        case "${{ matrix.runtime }}" in
          win-x64)     ESP_PKG="esptool-v${ESPTOOL_VERSION}-windows-amd64.zip";   ESP_BIN=esptool.exe ;;
          linux-x64)   ESP_PKG="esptool-v${ESPTOOL_VERSION}-linux-amd64.tar.gz";  ESP_BIN=esptool     ;;
          linux-arm64) ESP_PKG="esptool-v${ESPTOOL_VERSION}-linux-aarch64.tar.gz"; ESP_BIN=esptool    ;;
          osx-x64)     ESP_PKG="esptool-v${ESPTOOL_VERSION}-macos-amd64.tar.gz";  ESP_BIN=esptool     ;;
          osx-arm64)   ESP_PKG="esptool-v${ESPTOOL_VERSION}-macos-arm64.tar.gz";  ESP_BIN=esptool     ;;
          *) echo "Unknown runtime"; exit 1 ;;
        esac
        DEST=TomodachiDrawer.UI.Avalonia/EspTools
        URL="https://github.com/espressif/esptool/releases/download/v${ESPTOOL_VERSION}/${ESP_PKG}"
        mkdir -p "$DEST"
        echo "Downloading $URL"
        curl -fLsS -o esptool_pkg "$URL"
        mkdir esptool_extract
        case "${ESP_PKG}" in
          *.zip)    unzip -q esptool_pkg -d esptool_extract ;;
          *.tar.gz) tar -xzf esptool_pkg -C esptool_extract ;;
        esac
        echo "Archive contents:"
        find esptool_extract -type f | head -20
        # esptool archives put the binary in a subdir named after the package.
        find esptool_extract -type f -name "${ESP_BIN}" -exec cp {} "$DEST/${ESP_BIN}" \;
        chmod +x "$DEST/${ESP_BIN}" || true
        if [ ! -f "$DEST/${ESP_BIN}" ]; then
          echo "ERROR: $ESP_BIN not found after extracting $ESP_PKG"
          exit 1
        fi
        # Copy upstream LICENSE alongside the binary for GPLv2 §1/§3 compliance.
        # -print -quit takes the first match in case the archive has multiple.
        LICENSE_SRC="$(find esptool_extract -type f -name LICENSE -print -quit)"
        if [ -z "$LICENSE_SRC" ]; then
          echo "ERROR: LICENSE not found in esptool archive"
          exit 1
        fi
        cp "$LICENSE_SRC" "$DEST/LICENSE.esptool"
        ls -la "$DEST"
    - name: Download esptool source tarball for licence compliance
      shell: bash
      run: |
        set -euo pipefail
        DEST=TomodachiDrawer.UI.Avalonia/EspTools
        SRC_NAME="esptool-v${ESPTOOL_VERSION}-source.tar.gz"
        SRC_URL="https://github.com/espressif/esptool/archive/refs/tags/v${ESPTOOL_VERSION}.tar.gz"
        # Ships corresponding source under GPLv2 §3(a) / GPLv3 §6(a). This is
        # the same tarball GitHub generates from the v${ESPTOOL_VERSION} tag.
        # Runs per matrix runtime so every platform's release zip gets a copy.
        echo "Downloading $SRC_URL"
        curl -fLsS -o "$DEST/$SRC_NAME" "$SRC_URL"
        ls -la "$DEST/$SRC_NAME"
    - name: Build
      working-directory: TomodachiDrawer.UI.Avalonia
      run: |
        dotnet publish --configuration ${{ matrix.configuration }} \
          -r ${{ matrix.runtime }} \
          --self-contained \
          ${{ !contains(matrix.runtime, 'osx') && '-p:PublishTrimmed=true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true' || '-p:BundleMacOSApp=true' }} \
          ${{ github.ref_type == 'tag' && format('-p:Version={0}', github.ref_name) || '' }}
    - name: Upload Artifacts
      uses: actions/upload-artifact@v7
      with:
        name: TomodachiDrawer-Avalonia-${{ matrix.runtime }}-${{ matrix.configuration }}
        path: TomodachiDrawer.UI.Avalonia/bin/${{ matrix.configuration }}/net10.0/${{ matrix.runtime }}/publish/
  release:
    name: Draft release
    runs-on: ubuntu-latest
    needs: publish-avalonia
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
    - uses: actions/checkout@v6
    - name: Download artifacts
      uses: actions/download-artifact@v8
      with:
        path: unzipped-artifacts
        merge-multiple: false
    - name: Zip for Release
      run: |
        mkdir final-packages
        for dir in unzipped-artifacts/*/; do
          dirname=$(basename "$dir")
          cd "$dir"
          echo "Zipping/Tarring ${dirname}"

          outname="${dirname//osx/mac}"
          
          if [[ "$dirname" == *"osx"* ]]; then
            echo "Mac .tar.gz"
            chmod +x TomodachiDrawer.app/Contents/MacOS/TomodachiDrawer.UI.Avalonia
            tar -czvf "../../final-packages/${outname}-${{ github.ref_name }}.tar.gz" TomodachiDrawer.app TomodachiDrawer.Firmware.uf2 README.txt
          elif [[ "$dirname" == *"linux"* ]]; then
            echo "Linux .tar.gz"
            chmod +x TomodachiDrawer.UI.Avalonia
            tar -czvf "../../final-packages/${outname}-${{ github.ref_name }}.tar.gz" *
          else
            echo "Windows .zip"
            zip -r "../../final-packages/${outname}-${{ github.ref_name }}.zip" .
          fi
          
          cd ../..
        done
    - name: Create release draft
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release create ${{ github.ref_name}} final-packages/* --draft --generate-notes --title "${{ github.ref_name }} - RELEASENAME_REPLACEME"