name: .NET Build Test and Publish artifacts

on:
  push:
    branches:
      - master
    tags:
      - '*.*.*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        configuration: [Debug, Release]

    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'
        cache: true
        cache-dependency-path: '**/*.csproj'
    - name: Restore dependencies
      run: dotnet restore -v n /p:EnableWindowsTargeting=true
    - name: Build
      run: dotnet build --configuration ${{ matrix.configuration }} --no-restore /p:EnableWindowsTargeting=true
    - name: Test
      run: dotnet test --configuration ${{ matrix.configuration }} --no-build --verbosity normal /p:EnableWindowsTargeting=true
  publish-avalonia:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        configuration: [Release]
        runtime: [win-x64, win-arm64, linux-x64, linux-arm64, osx-x64, osx-arm64]

    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'
        cache: true
        cache-dependency-path: '**/*.csproj'
    - name: Build
      working-directory: TomodachiDrawer.UI.Avalonia
      run: dotnet publish --configuration ${{ matrix.configuration }} -r ${{ matrix.runtime }} --self-contained -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true
    - name: Zip Published Files 
      run: |
        cd TomodachiDrawer.UI.Avalonia/bin/${{ matrix.configuration }}/net10.0/${{ matrix.runtime }}/publish/
        zip -r "${{ github.workspace }}/TomodachiDrawer-Avalonia-${{ matrix.runtime }}-${{ matrix.configuration }}.zip" .
    - name: Upload Artifacts
      uses: actions/upload-artifact@v7
      with:
        name: TomodachiDrawer-Avalonia-${{ matrix.runtime }}-${{ matrix.configuration }}
        path: TomodachiDrawer-Avalonia-${{ matrix.runtime }}-${{ matrix.configuration }}.zip 
  release:
    name: Draft release
    runs-on: ubuntu-latest
    needs: publish-avalonia
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
    - uses: actions/checkout@v6
    - name: Download artifacts
      uses: actions/download-artifact@v8
      with:
        path: artifacts
        merge-multiple: true
    - name: Rename Zips
      run: |
        cd artifacts
        for file in *.zip; do
          mv "$file" "${file/.zip/-${{ github.ref_name }}.zip}"
        done
    - name: Create release draft
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release create ${{ github.ref_name}} artifacts/*.zip --draft --generate-notes --title "${{ github.ref_name }} - RELEASENAME"